<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg-light" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc"/>
      <stop offset="50%" style="stop-color:#e2e8f0"/>
      <stop offset="100%" style="stop-color:#cbd5e1"/>
    </linearGradient>
    <linearGradient id="glass-light" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.85)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0.55)"/>
    </linearGradient>
    <linearGradient id="accent-light" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="accent2-light" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f472b6"/>
      <stop offset="100%" style="stop-color:#fb7185"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.95)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>

  <!-- 浅色圆角背景 -->
  <rect width="1024" height="1024" rx="224" ry="224" fill="url(#bg-light)"/>

  <!-- 彩色光晕装饰 -->
  <circle cx="260" cy="260" r="220" fill="#6366f1" opacity="0.12"/>
  <circle cx="780" cy="780" r="180" fill="#f472b6" opacity="0.1"/>
  <circle cx="800" cy="280" r="120" fill="#22d3ee" opacity="0.1"/>

  <!-- 玻璃态卡片 -->
  <g transform="translate(512, 512)">
    <rect x="-180" y="-240" width="360" height="480" rx="32" ry="32" fill="url(#glass-light)" stroke="rgba(255,255,255,0.9)" stroke-width="3"/>

    <!-- 顶部高光 -->
    <path d="M -180,-240 L 180,-240 L 180,-140 Q 0,-200 -180,-140 Z" fill="url(#shine)"/>
    <rect x="-180" y="-240" width="360" height="8" rx="4" fill="rgba(255,255,255,0.8)"/>

    <!-- 漫画分镜 -->
    <g transform="translate(0, -80)">
      <!-- 分镜1 -->
      <rect x="-140" y="-120" width="120" height="90" rx="12" fill="rgba(99,102,241,0.15)" stroke="rgba(99,102,241,0.4)" stroke-width="2"/>
      <circle cx="-100" cy="-90" r="15" fill="url(#accent-light)" opacity="0.9"/>
      <circle cx="-60" cy="-70" r="10" fill="url(#accent-light)" opacity="0.5"/>

      <!-- 分镜2 -->
      <rect x="20" y="-120" width="120" height="90" rx="12" fill="rgba(244,114,182,0.15)" stroke="rgba(244,114,182,0.4)" stroke-width="2"/>
      <rect x="40" y="-100" width="80" height="8" rx="4" fill="rgba(99,102,241,0.4)"/>
      <rect x="40" y="-80" width="60" height="8" rx="4" fill="rgba(139,92,246,0.3)"/>

      <!-- 分镜3（大） -->
      <rect x="-140" y="-10" width="280" height="110" rx="16" fill="rgba(99,102,241,0.08)" stroke="rgba(99,102,241,0.2)" stroke-width="2"/>
      <rect x="-120" y="10" width="200" height="6" rx="3" fill="rgba(99,102,241,0.3)"/>
      <rect x="-120" y="30" width="160" height="6" rx="3" fill="rgba(139,92,246,0.25)"/>
      <rect x="-120" y="50" width="120" height="6" rx="3" fill="rgba(244,114,182,0.25)"/>

      <!-- 对话气泡 -->
      <ellipse cx="80" cy="40" rx="35" ry="25" fill="url(#accent2-light)" opacity="0.95"/>
      <polygon points="60,60 50,75 70,62" fill="url(#accent2-light)" opacity="0.95"/>
    </g>

    <!-- 底部进度条 -->
    <rect x="-140" y="180" width="280" height="8" rx="4" fill="rgba(99,102,241,0.15)"/>
    <rect x="-140" y="180" width="180" height="8" rx="4" fill="url(#accent-light)"/>
  </g>
</svg>