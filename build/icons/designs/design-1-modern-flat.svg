<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <linearGradient id="book1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#f0f0f5"/>
    </linearGradient>
    <filter id="shadow1" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000000" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="1024" height="1024" rx="224" ry="224" fill="url(#bg1)"/>

  <!-- 漫画书 -->
  <g transform="translate(512, 512)" filter="url(#shadow1)">
    <!-- 书本主体 -->
    <rect x="-200" y="-260" width="400" height="520" rx="24" ry="24" fill="url(#book1)"/>

    <!-- 书脊 -->
    <rect x="-200" y="-260" width="48" height="520" rx="12" ry="12" fill="#e8e8f0"/>
    <rect x="-196" y="-260" width="4" height="520" fill="#d0d0e0"/>

    <!-- 封面内容 -->
    <g transform="translate(0, -60)">
      <!-- 图片框1 -->
      <rect x="-120" y="-140" width="100" height="80" rx="12" ry="12" fill="#f0e6ff"/>
      <rect x="-110" y="-130" width="80" height="60" rx="8" ry="8" fill="#e0d0f5"/>

      <!-- 图片框2 -->
      <rect x="20" y="-140" width="100" height="80" rx="12" ry="12" fill="#f0e6ff"/>
      <rect x="30" y="-130" width="80" height="60" rx="8" ry="8" fill="#e0d0f5"/>

      <!-- 对话框 -->
      <rect x="-120" y="-20" width="240" height="100" rx="16" ry="16" fill="#fff5e6"/>
      <polygon points="-80,80 -60,100 -40,80" fill="#fff5e6"/>

      <!-- 对话框内文字线 -->
      <rect x="-100" y="0" width="200" height="8" rx="4" ry="4" fill="#ffd699"/>
      <rect x="-100" y="24" width="160" height="8" rx="4" ry="4" fill="#ffd699"/>
      <rect x="-100" y="48" width="120" height="8" rx="4" ry="4" fill="#ffd699"/>
    </g>

    <!-- 底部装饰线 -->
    <rect x="-160" y="200" width="320" height="6" rx="3" ry="3" fill="#e0e0e8"/>
  </g>
</svg>