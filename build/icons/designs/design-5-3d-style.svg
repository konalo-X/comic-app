<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <linearGradient id="bookCover" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#f8f9fa"/>
    </linearGradient>
    <linearGradient id="spine5" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e9ecef"/>
      <stop offset="100%" style="stop-color:#dee2e6"/>
    </linearGradient>
    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="20" flood-color="#000000" flood-opacity="0.2"/>
    </filter>
    <filter id="innerShadow">
      <feOffset dx="0" dy="2"/>
      <feGaussianBlur stdDeviation="3" result="offset-blur"/>
      <feComposite operator="out" in="SourceGraphic" in2="offset-blur" result="inverse"/>
      <feFlood flood-color="black" flood-opacity="0.1" result="color"/>
      <feComposite operator="in" in="color" in2="inverse" result="shadow"/>
      <feComposite operator="over" in="shadow" in2="SourceGraphic"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="1024" height="1024" rx="224" ry="224" fill="url(#bg5)"/>

  <!-- 装饰圆 -->
  <circle cx="250" cy="250" r="180" fill="#ffffff" opacity="0.08"/>
  <circle cx="800" cy="800" r="220" fill="#ffffff" opacity="0.05"/>

  <!-- 3D 书本 -->
  <g transform="translate(512, 512)" filter="url(#dropShadow)">
    <!-- 书本厚度（3D效果） -->
    <path d="M -160,-200 L -140,-180 L 180,-180 L 160,-200 Z" fill="#ced4da"/>
    <path d="M 160,-200 L 180,-180 L 180,240 L 160,220 Z" fill="#adb5bd"/>

    <!-- 封面 -->
    <rect x="-160" y="-200" width="320" height="420" rx="20" ry="20" fill="url(#bookCover)"/>

    <!-- 书脊 -->
    <rect x="-160" y="-200" width="44" height="420" rx="12" ry="12" fill="url(#spine5)"/>
    <rect x="-156" y="-200" width="4" height="420" fill="#ced4da"/>

    <!-- 封面内容 -->
    <g transform="translate(22, -50)">
      <!-- 标题区域 -->
      <rect x="-100" y="-130" width="200" height="36" rx="10" fill="#f8f9fa" stroke="#e9ecef" stroke-width="2"/>
      <rect x="-80" y="-118" width="80" height="8" rx="4" fill="#adb5bd"/>
      <rect x="10" y="-118" width="40" height="8" rx="4" fill="#adb5bd"/>

      <!-- 漫画分镜网格 -->
      <g transform="translate(0, 20)">
        <!-- 分镜1 -->
        <rect x="-110" y="-60" width="100" height="75" rx="10" fill="#fff5f5" stroke="#ffc9c9" stroke-width="2"/>
        <circle cx="-80" cy="-30" r="14" fill="#ff6b6b" opacity="0.8"/>
        <circle cx="-50" cy="-15" r="8" fill="#ff6b6b" opacity="0.5"/>

        <!-- 分镜2 -->
        <rect x="10" y="-60" width="100" height="75" rx="10" fill="#f0fff4" stroke="#b2f2bb" stroke-width="2"/>
        <rect x="25" y="-45" width="70" height="6" rx="3" fill="#51cf66" opacity="0.6"/>
        <rect x="25" y="-30" width="50" height="6" rx="3" fill="#51cf66" opacity="0.4"/>

        <!-- 分镜3（大） -->
        <rect x="-110" y="30" width="220" height="90" rx="12" fill="#fff9db" stroke="#ffec99" stroke-width="2"/>
        <rect x="-90" y="50" width="160" height="6" rx="3" fill="#fcc419" opacity="0.5"/>
        <rect x="-90" y="68" width="120" height="6" rx="3" fill="#fcc419" opacity="0.35"/>
        <rect x="-90" y="86" width="80" height="6" rx="3" fill="#fcc419" opacity="0.25"/>

        <!-- 对话气泡 -->
        <ellipse cx="70" cy="75" rx="28" ry="20" fill="white" stroke="#dee2e6" stroke-width="2"/>
        <polygon points="55,90 45,105 65,92" fill="white" stroke="#dee2e6" stroke-width="2"/>
        <line x1="55" y1="90" x2="65" y2="92" stroke="white" stroke-width="3"/>
      </g>
    </g>

    <!-- 底部标签 -->
    <rect x="-120" y="170" width="240" height="8" rx="4" fill="#e9ecef"/>
  </g>

  <!-- 浮动装饰元素 -->
  <g opacity="0.6">
    <rect x="180" y="700" width="40" height="40" rx="10" fill="#ff6b6b" transform="rotate(-15 200 720)"/>
    <rect x="780" y="200" width="50" height="50" rx="12" fill="#4ecdc4" transform="rotate(20 805 225)"/>
    <circle cx="200" cy="300" r="20" fill="#ffe66d"/>
    <circle cx="800" cy="700" r="25" fill="#a8e6cf"/>
  </g>
</svg>