<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c0c1d"/>
      <stop offset="100%" style="stop-color:#1a1a3e"/>
    </linearGradient>
    <linearGradient id="neon1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00f5ff"/>
      <stop offset="100%" style="stop-color:#0080ff"/>
    </linearGradient>
    <linearGradient id="neon2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff00ff"/>
      <stop offset="100%" style="stop-color:#ff0080"/>
    </linearGradient>
    <linearGradient id="neon3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffff00"/>
      <stop offset="100%" style="stop-color:#ff8000"/>
    </linearGradient>
    <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 深色背景 -->
  <rect width="1024" height="1024" rx="224" ry="224" fill="url(#bg4)"/>

  <!-- 背景网格 -->
  <g opacity="0.1">
    <line x1="0" y1="200" x2="1024" y2="200" stroke="#00f5ff" stroke-width="1"/>
    <line x1="0" y1="400" x2="1024" y2="400" stroke="#00f5ff" stroke-width="1"/>
    <line x1="0" y1="600" x2="1024" y2="600" stroke="#00f5ff" stroke-width="1"/>
    <line x1="0" y1="800" x2="1024" y2="800" stroke="#00f5ff" stroke-width="1"/>
    <line x1="200" y1="0" x2="200" y2="1024" stroke="#00f5ff" stroke-width="1"/>
    <line x1="400" y1="0" x2="400" y2="1024" stroke="#00f5ff" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="1024" stroke="#00f5ff" stroke-width="1"/>
    <line x1="800" y1="0" x2="800" y2="1024" stroke="#00f5ff" stroke-width="1"/>
  </g>

  <!-- 中心漫画书 -->
  <g transform="translate(512, 512)">
    <!-- 书本外框 -->
    <rect x="-170" y="-230" width="340" height="460" rx="16" ry="16" fill="none" stroke="url(#neon1)" stroke-width="4" filter="url(#neonGlow)"/>

    <!-- 书脊 -->
    <line x1="-130" y1="-230" x2="-130" y2="230" stroke="url(#neon1)" stroke-width="3" filter="url(#neonGlow)"/>

    <!-- 分镜1 -->
    <rect x="-110" y="-180" width="90" height="70" rx="8" fill="none" stroke="url(#neon2)" stroke-width="3" filter="url(#neonGlow)"/>
    <circle cx="-85" cy="-155" r="12" fill="none" stroke="#ff00ff" stroke-width="2" filter="url(#neonGlow)"/>
    <circle cx="-55" cy="-140" r="8" fill="none" stroke="#ff00ff" stroke-width="2" filter="url(#neonGlow)"/>

    <!-- 分镜2 -->
    <rect x="20" y="-180" width="90" height="70" rx="8" fill="none" stroke="url(#neon3)" stroke-width="3" filter="url(#neonGlow)"/>
    <line x1="40" y1="-160" x2="90" y2="-160" stroke="#ffff00" stroke-width="2" filter="url(#neonGlow)"/>
    <line x1="40" y1="-145" x2="80" y2="-145" stroke="#ffff00" stroke-width="2" filter="url(#neonGlow)"/>

    <!-- 分镜3（大） -->
    <rect x="-110" y="-80" width="220" height="120" rx="12" fill="none" stroke="url(#neon1)" stroke-width="3" filter="url(#neonGlow)"/>
    <line x1="-90" y1="-50" x2="80" y2="-50" stroke="#00f5ff" stroke-width="2" filter="url(#neonGlow)"/>
    <line x1="-90" y1="-25" x2="60" y2="-25" stroke="#00f5ff" stroke-width="2" filter="url(#neonGlow)"/>
    <line x1="-90" y1="0" x2="40" y2="0" stroke="#00f5ff" stroke-width="2" filter="url(#neonGlow)"/>

    <!-- 对话气泡 -->
    <ellipse cx="70" cy="20" rx="35" ry="25" fill="none" stroke="url(#neon2)" stroke-width="3" filter="url(#neonGlow)"/>
    <polygon points="50,40 35,55 55,42" fill="none" stroke="url(#neon2)" stroke-width="3" filter="url(#neonGlow)"/>

    <!-- 底部进度 -->
    <line x1="-110" y1="180" x2="110" y2="180" stroke="#1a1a3e" stroke-width="6" stroke-linecap="round"/>
    <line x1="-110" y1="180" x2="50" y2="180" stroke="url(#neon3)" stroke-width="6" stroke-linecap="round" filter="url(#neonGlow)"/>
  </g>

  <!-- 四角装饰 -->
  <circle cx="200" cy="200" r="60" fill="none" stroke="#00f5ff" stroke-width="2" opacity="0.3" filter="url(#neonGlow)"/>
  <circle cx="824" cy="824" r="80" fill="none" stroke="#ff00ff" stroke-width="2" opacity="0.3" filter="url(#neonGlow)"/>
</svg>